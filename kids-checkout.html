<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VUMC Kids Check-Out</title>

  <style>
    :root{
      --navy:#16324f;
      --blue:#2c7be5;
      --teal:#1fb6aa;
      --bg:#eef3f9;
      --text:#1f2937;
      --muted:#667085;
      --success:#14532d;
      --error:#9f1239;
      --shadow:0 18px 45px rgba(16,24,40,.10);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(44,123,229,.10), transparent 30%),
        radial-gradient(circle at top right, rgba(31,182,170,.12), transparent 35%),
        linear-gradient(180deg,#eef3f9,#f7f9fc);
      color:var(--text);
      display:grid;
      place-items:center;
      padding:20px;
    }

    .card{
      width:min(680px,100%);
      background:#fff;
      border-radius:28px;
      padding:34px;
      box-shadow:var(--shadow);
      text-align:center;
    }

    .badge{
      width:76px;
      height:76px;
      border-radius:22px;
      background:linear-gradient(135deg,var(--blue),var(--teal));
      color:#fff;
      display:grid;
      place-items:center;
      margin:0 auto 18px;
      font-size:2rem;
      font-weight:800;
    }

    h1{
      margin:0 0 10px;
      color:var(--navy);
      font-size:2.3rem;
    }

    p{
      margin:0 0 24px;
      color:var(--muted);
      font-size:1.05rem;
      line-height:1.6;
    }

    input{
      width:100%;
      min-height:70px;
      border-radius:20px;
      border:2px solid rgba(44,123,229,.22);
      font-size:2.3rem;
      text-align:center;
      letter-spacing:.18em;
      text-transform:uppercase;
      padding:10px 14px;
      outline:none;
      color:var(--navy);
      font-weight:800;
    }

    input:focus{
      border-color:rgba(44,123,229,.65);
      box-shadow:0 0 0 4px rgba(44,123,229,.10);
    }

    button{
      width:100%;
      min-height:62px;
      margin-top:16px;
      border:0;
      border-radius:18px;
      color:#fff;
      font-weight:800;
      font-size:1.1rem;
      cursor:pointer;
    }

    .verify{
      background:linear-gradient(135deg,var(--blue),var(--teal));
    }

    .home{
      background:var(--navy);
    }

    .back{
      background:#6b7280;
    }

    .result{
      margin-top:22px;
      padding:20px;
      border-radius:20px;
      display:none;
      line-height:1.6;
      text-align:left;
      font-size:1rem;
    }

    .result.ok{
      display:block;
      background:#f0f9f2;
      color:var(--success);
      border:1px solid #cfe8d6;
    }

    .result.err{
      display:block;
      background:#fff1f2;
      color:var(--error);
      border:1px solid #fecdd3;
    }

    .result strong{
      font-size:1.25rem;
    }

    .children-title{
      font-size:1.1rem;
      font-weight:800;
      margin-top:12px;
      color:var(--navy);
    }

    ul{
      margin:8px 0 0;
      padding-left:22px;
    }

    li{
      margin:4px 0;
      font-weight:700;
    }

    .small{
      font-size:.9rem;
      color:var(--muted);
      margin-top:14px;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="badge">✓</div>

    <h1>VUMC Kids Check-Out</h1>
    <p>Enter the pickup code shown by the parent or guardian.</p>

    <input id="code" maxlength="4" placeholder="CODE" autocomplete="off" autocapitalize="characters">

    <button id="verify" class="verify">Verify Pickup Code</button>
    <button onclick="goBack()" class="back">Back to Kids Check-In</button>
    <button onclick="goHome()" class="home">Home</button>

    <div id="result" class="result"></div>
  </main>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkn7gc4YiQ93wvL6dzazkzXkobZfGv6SjKQKgwLpawQwgaigB0Fal8-0WDOyG-RePj/exec";

    const codeEl = document.getElementById('code');
    const resultEl = document.getElementById('result');
    const verifyBtn = document.getElementById('verify');

    async function apiCall(payload){
      const formData = new URLSearchParams();

      Object.keys(payload).forEach(key => {
        formData.append(key, String(payload[key] ?? ''));
      });

      const res = await fetch(SCRIPT_URL, {
        method:'POST',
        body:formData
      });

      const text = await res.text();
      if (!text.trim()) throw new Error('Empty response from Apps Script');

      return JSON.parse(text);
    }

    async function verifyCode(){
      const code = codeEl.value.trim().toUpperCase();

      resultEl.className = 'result';
      resultEl.style.display = 'none';
      resultEl.innerHTML = '';

      if(!code){
        showError('Enter a pickup code.');
        return;
      }

      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Checking...';

      try{
        const res = await apiCall({
          action:'verifyPickupCode',
          pickupCode:code
        });

        if(res.ok){
          const kids = (res.record.children || [])
            .map(name => `<li>${escapeHtml(name)}</li>`)
            .join('');

          resultEl.className = 'result ok';
          resultEl.innerHTML = `
            <strong>Code Verified</strong><br>
            This pickup code matches an active kids check-in.

            <div class="children-title">Children:</div>
            <ul>${kids || '<li>No names listed</li>'}</ul>

            <div class="small">
              Submitted: ${escapeHtml(res.record.submitted || '')}<br>
              Checked out: ${escapeHtml(res.record.checkedOutAt || 'Now')}
            </div>
          `;

          codeEl.value = '';
        } else {
          resultEl.className = 'result err';

          let extra = '';
          if(res.record && res.record.children){
            const kids = (res.record.children || [])
              .map(name => `<li>${escapeHtml(name)}</li>`)
              .join('');

            extra = `
              <div class="children-title">Record Found:</div>
              <ul>${kids}</ul>
            `;
          }

          resultEl.innerHTML = `
            <strong>Not Verified</strong><br>
            ${escapeHtml(res.error || 'Code not found.')}
            ${extra}
          `;
        }
      } catch(e){
        showError(e.message || 'Unable to verify code.');
      }

      verifyBtn.disabled = false;
      verifyBtn.textContent = 'Verify Pickup Code';
      resultEl.style.display = 'block';
      codeEl.focus();
    }

    function showError(message){
      resultEl.className = 'result err';
      resultEl.innerHTML = `<strong>Error</strong><br>${escapeHtml(message)}`;
      resultEl.style.display = 'block';
    }

    function goBack(){
      window.location.href = 'vumc-kids-check-in.html';
    }

    function goHome(){
      window.location.href = 'index.html';
    }

    function escapeHtml(s){
      return String(s || '').replace(/[&<>"']/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[m]));
    }

    document.getElementById('verify').onclick = verifyCode;

    codeEl.addEventListener('keydown', e => {
      if(e.key === 'Enter') verifyCode();
    });

    codeEl.addEventListener('input', () => {
      codeEl.value = codeEl.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0,4);
    });

    codeEl.focus();
  </script>
</body>
</html>
