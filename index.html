<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VUMC Kiosk</title>
  <style>
    :root{
      --blue:#2c7be5;
      --teal:#1fb6aa;
      --navy:#16324f;
      --bg:#eef3f9;
      --card:#ffffff;
      --text:#1f2937;
      --shadow:0 18px 45px rgba(16,24,40,.10);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#eef3f9,#f7f9fc);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }

    .wrap{
      width:min(900px,95%);
      text-align:center;
    }

    h1{
      font-size:2.8rem;
      margin-bottom:10px;
      color:var(--navy);
    }

    p{
      margin-bottom:30px;
      color:#667085;
      font-size:1.1rem;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
    }

    .card{
      background:var(--card);
      border-radius:24px;
      padding:30px 20px;
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:transform .2s ease, box-shadow .2s ease;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 22px 50px rgba(16,24,40,.15);
    }

    .icon{
      width:80px;
      height:80px;
      margin:0 auto 16px;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2rem;
      color:#fff;
    }

    .checkin{background:linear-gradient(135deg,var(--blue),var(--teal));}
    .events{background:linear-gradient(135deg,#f59e0b,#ef4444);}

    .card h2{
      margin:0;
      font-size:1.3rem;
      color:var(--navy);
    }

  </style>
</head>
<body>

  <div class="wrap">
    <h1>Welcome</h1>
    <p>Please choose an option below</p>

    <div class="grid">

      <div class="card" onclick="location.href='check-in.html'">
        <div class="icon checkin">✓</div>
        <h2>Check In</h2>
      </div>

      <div class="card" onclick="alert('Coming Soon')">
        <div class="icon events">📅</div>
        <h2>Event Signups</h2>
      </div>

    </div>
  </div>

</body>
</html>
