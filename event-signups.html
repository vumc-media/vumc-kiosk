<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VUMC Event Signups</title>

  <style>
    :root{
      --navy:#16324f;
      --bg:#eef3f9;
      --text:#1f2937;
      --muted:#667085;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .wrap{
      width:min(800px,95%);
      text-align:center;
    }

    h1{
      margin:0 0 10px;
      font-size:2.4rem;
      color:var(--navy);
    }

    p{
      margin:0 0 30px;
      color:var(--muted);
      font-size:1.1rem;
    }

    .card{
      padding:40px 20px;
      border-radius:26px;
      color:#fff;
      cursor:pointer;
      transition:.2s;
      box-shadow:0 20px 50px rgba(0,0,0,.15);
      background:linear-gradient(135deg,#2c7be5,#1fb6aa);
      margin-bottom:20px;
    }

    .card:hover{
      transform:translateY(-6px) scale(1.02);
    }

    .card h2{
      margin:0 0 12px;
      font-size:1.6rem;
    }

    .card p{
      margin:0;
      font-size:1rem;
      opacity:.9;
    }

    .coming{
      margin-top:20px;
      font-size:1rem;
      color:var(--muted);
      font-style:italic;
    }

  </style>
</head>

<body>

  <div class="wrap">

    <h1>Event Signups</h1>
    <p>Tap below to view event details and sign up</p>

    <!-- CURRENT EVENT -->
    <div class="card" onclick="go('https://versaillesumc.churchcenter.com/calendar/event/220169950')">
      <h2>Mother’s Day Celebration</h2>
      <p>Tap to view event and sign up</p>
    </div>

    <!-- COMING SOON MESSAGE -->
    <div class="coming">
      More events coming soon
    </div>

  </div>

  <script>
    function go(url){
      window.location.href = url;
    }
  </script>

</body>
</html>
