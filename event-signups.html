<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VUMC Event Signups</title>

  <style>
    :root{
      --navy:#16324f;
      --bg:#eef3f9;
      --text:#1f2937;
      --muted:#667085;
      --blue:#2c7be5;
      --teal:#1fb6aa;
      --border:rgba(15,23,42,.10);
      --max:1100px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:100vh;
    }

    /* =========================
       TOP BAR (NEW)
    ========================= */
    .topbar{
      width:100%;
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:blur(12px);
      background:rgba(255,255,255,.85);
      border-bottom:1px solid var(--border);
    }

    .topbar-inner{
      width:min(var(--max), calc(100% - 28px));
      margin:0 auto;
      min-height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand-badge{
      width:36px;
      height:36px;
      border-radius:10px;
      background:linear-gradient(135deg,var(--blue),var(--teal));
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:700;
    }

    .brand-kicker{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
    }

    .brand-title{
      font-size:1rem;
      font-weight:700;
      color:var(--navy);
    }

    .nav{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .nav a{
      padding:8px 12px;
      border-radius:999px;
      font-size:.95rem;
      text-decoration:none;
      color:var(--navy);
      transition:.2s;
    }

    .nav a:hover{
      background:rgba(44,123,229,.08);
    }

    .nav a.active{
      background:linear-gradient(135deg,var(--blue),var(--teal));
      color:#fff;
    }

    /* ========================= */

    .wrap{
      width:min(800px,95%);
      text-align:center;
      margin-top:30px;
    }

    h1{
      margin:0 0 10px;
      font-size:2.4rem;
      color:var(--navy);
    }

    p{
      margin:0 0 30px;
      color:var(--muted);
      font-size:1.1rem;
    }

    .card{
      padding:40px 20px;
      border-radius:26px;
      color:#fff;
      cursor:pointer;
      transition:.2s;
      box-shadow:0 20px 50px rgba(0,0,0,.15);
      background:linear-gradient(135deg,#2c7be5,#1fb6aa);
      margin-bottom:20px;
    }

    .card:hover{
      transform:translateY(-6px) scale(1.02);
    }

    .card h2{
      margin:0 0 12px;
      font-size:1.6rem;
    }

    .card p{
      margin:0;
      font-size:1rem;
      opacity:.9;
    }

    .coming{
      margin-top:20px;
      font-size:1rem;
      color:var(--muted);
      font-style:italic;
    }

  </style>
</head>

<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-badge">V</div>
        <div>
          <div class="brand-kicker">VUMC Kiosk</div>
          <div class="brand-title">Event Signups</div>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="check-in.html">Check In</a>
        <a href="event-signups.html" class="active">Event Signups</a>
      </nav>
    </div>
  </header>

  <div class="wrap">

    <h1>Event Signups</h1>
    <p>Tap below to view event details and sign up</p>

    <!-- CURRENT EVENT -->
    <div class="card" onclick="go('https://versaillesumc.churchcenter.com/calendar/event/220169950')">
      <h2>Mother’s Day Celebration</h2>
      <p>Tap to view event and sign up</p>
    </div>

    <!-- COMING SOON MESSAGE -->
    <div class="coming">
      More events coming soon
    </div>

  </div>

  <script>
    function go(url){
      window.location.href = url;
    }
  </script>

</body>
</html>
