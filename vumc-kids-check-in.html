<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>VUMC Kids Check-In</title>

<style>
:root{
  --navy:#16324f;
  --blue:#2c7be5;
  --teal:#1fb6aa;
  --bg:#eef3f9;
  --text:#1f2937;
  --muted:#667085;
  --shadow:0 18px 45px rgba(16,24,40,.10);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#eef3f9,#f7f9fc);
  color:var(--text);
  display:flex;
  justify-content:center;
}

.wrap{
  width:min(1100px,95%);
  padding:20px 0;
}

.hero{
  background:linear-gradient(135deg,var(--blue),var(--teal));
  color:#fff;
  border-radius:28px;
  padding:28px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}

.hero h1{
  margin:0 0 8px;
  font-size:2.4rem;
}

.hero p{
  margin:0;
  opacity:.95;
}

.panel{
  background:#fff;
  border-radius:24px;
  padding:20px;
  box-shadow:var(--shadow);
}

.search{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:2px solid rgba(44,123,229,.2);
  font-size:1.2rem;
  margin-bottom:14px;
}

.list{
  max-height:320px;
  overflow:auto;
  margin-bottom:14px;
}

.row{
  padding:12px;
  border:1px solid #e5e7eb;
  border-radius:12px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:10px;
}

.row input{
  width:20px;
  height:20px;
}

.selected{
  margin-top:16px;
  min-height:42px;
  color:var(--navy);
  font-weight:700;
}

.submit,
.checkout-btn{
  margin-top:14px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  color:#fff;
  font-size:1.15rem;
  font-weight:bold;
  cursor:pointer;
}

.submit{
  background:linear-gradient(135deg,var(--blue),var(--teal));
}

.checkout-btn{
  background:var(--navy);
}

.success{
  display:none;
  text-align:center;
  padding:40px 20px;
}

.success.show{
  display:block;
}

.success h2{
  margin:0 0 12px;
  color:var(--navy);
  font-size:2rem;
}

.code{
  display:inline-block;
  font-size:3rem;
  font-weight:800;
  letter-spacing:.15em;
  margin:18px 0;
  color:#14532d;
  background:#f0f9f2;
  border:1px solid #cfe8d6;
  border-radius:18px;
  padding:14px 26px;
}

.success p{
  color:var(--muted);
  font-size:1.05rem;
  line-height:1.6;
}

.status{
  margin-top:12px;
  font-weight:700;
}

.err{
  color:#b00020;
}

.ok{
  color:#0a7a2a;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="hero">
    <h1>VUMC Kids Check-In</h1>
    <p>Select children, submit check-in, and receive a pickup code.</p>
  </div>

  <div id="main" class="panel">

    <input id="search" class="search" placeholder="Search by last name">

    <div id="list" class="list">
      Loading children list...
    </div>

    <div id="selected" class="selected">
      No children selected yet.
    </div>

    <button id="submit" class="submit">Submit Kids Check-In</button>

    <button onclick="goToCheckout()" class="checkout-btn">
      Kids Check-Out
    </button>

    <div id="status" class="status"></div>

  </div>

  <div id="success" class="panel success">
    <h2>Check-In Complete</h2>
    <div id="code" class="code"></div>
    <p>
      Show this code at pickup.<br>
      A VUMC Kids volunteer will match it with your check-in.
    </p>

    <button onclick="resetKiosk()" class="submit">
      New Check-In
    </button>

    <button onclick="goToCheckout()" class="checkout-btn">
      Go to Kids Check-Out
    </button>
  </div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkn7gc4YiQ93wvL6dzazkzXkobZfGv6SjKQKgwLpawQwgaigB0Fal8-0WDOyG-RePj/exec";

let all = [];
let selected = new Map();

const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');
const selectedEl = document.getElementById('selected');
const statusEl = document.getElementById('status');

async function load(){
  statusEl.textContent = 'Loading children...';

  try{
    const res = await fetch(SCRIPT_URL + '?action=getPeople');
    const data = await res.json();

    if(!data.ok){
      listEl.innerHTML = 'Children list unavailable.';
      statusEl.textContent = data.error || 'Failed to load children.';
      statusEl.className = 'status err';
      return;
    }

    all = data.rows || [];
    render(all);
    statusEl.textContent = `Loaded ${all.length} active children.`;
    statusEl.className = 'status ok';
  } catch(e){
    listEl.innerHTML = 'Children list unavailable.';
    statusEl.textContent = e.message || 'Failed to load children.';
    statusEl.className = 'status err';
  }
}

function render(arr){
  listEl.innerHTML = '';

  if(!arr.length){
    listEl.innerHTML = 'No children found.';
    return;
  }

  arr.forEach(p=>{
    const div = document.createElement('label');
    div.className='row';

    div.innerHTML = `
      <input type="checkbox" value="${escapeHtml(p.id)}">
      <span>${escapeHtml(p.name)}</span>
    `;

    const checkbox = div.querySelector('input');

    checkbox.addEventListener('change', () => {
      if(checkbox.checked){
        selected.set(String(p.id), p);
      } else {
        selected.delete(String(p.id));
      }
      drawSelected();
    });

    listEl.appendChild(div);
  });
}

searchEl.oninput = ()=>{
  const q = searchEl.value.toLowerCase().trim();

  if(!q){
    render(all);
    return;
  }

  render(all.filter(p =>
    String(p.name || '').toLowerCase().includes(q) ||
    String(p.first_name || '').toLowerCase().includes(q) ||
    String(p.last_name || '').toLowerCase().includes(q)
  ));
};

function drawSelected(){
  if(!selected.size){
    selectedEl.textContent = 'No children selected yet.';
    return;
  }

  selectedEl.textContent = [...selected.values()].map(p=>p.name).join(', ');
}

document.getElementById('submit').onclick = async ()=>{
  if(!selected.size){
    alert('Select at least one child.');
    return;
  }

  const people = [...selected.values()].map(p => ({
    id: String(p.id),
    name: String(p.name || '')
  }));

  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const iso = `${yyyy}-${mm}-${dd}`;

  statusEl.textContent = 'Submitting kids check-in...';
  statusEl.className = 'status';

  try{
    const res = await fetch(SCRIPT_URL,{
      method:'POST',
      body:new URLSearchParams({
        action:'submitAttendance',
        people: JSON.stringify(people),
        personIds: JSON.stringify(people.map(p => p.id)),
        label:'VUMC Kids Check-In',
        isoDate:iso
      })
    });

    const data = await res.json();

    if(data.ok){
      document.getElementById('main').style.display='none';
      document.getElementById('success').classList.add('show');
      document.getElementById('code').textContent = data.pickupCode || '----';
    } else {
      statusEl.textContent = data.error || 'Submit failed.';
      statusEl.className = 'status err';
      alert(data.error || 'Submit failed.');
    }
  } catch(e){
    statusEl.textContent = e.message || 'Submit failed.';
    statusEl.className = 'status err';
    alert(e.message || 'Submit failed.');
  }
};

function resetKiosk(){
  selected.clear();
  selectedEl.textContent = 'No children selected yet.';
  searchEl.value = '';
  document.getElementById('success').classList.remove('show');
  document.getElementById('main').style.display = '';
  render(all);
  searchEl.focus();
}

function goToCheckout(){
  window.location.href = 'kids-checkout.html';
}

function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[m]));
}

load();
</script>

</body>
</html>
