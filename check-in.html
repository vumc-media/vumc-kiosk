<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>VUMC Check-In Kiosk</title>

  <style>
    :root{
      --navy:#16324f;
      --blue:#2c7be5;
      --teal:#1fb6aa;
      --gold:#f2c94c;
      --bg:#eef3f9;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#667085;
      --border:rgba(15,23,42,.10);
      --shadow:0 18px 45px rgba(16,24,40,.10);
      --success:#0a7a2a;
      --error:#b00020;
      --radius:24px;
      --max:1100px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body{
      background:
        radial-gradient(circle at top left, rgba(44,123,229,.10), transparent 28%),
        radial-gradient(circle at top right, rgba(31,182,170,.12), transparent 32%),
        linear-gradient(180deg,#eef3f9 0%,#f6f8fb 45%,#edf2f7 100%);
    }

    /* =========================
       TOP BAR (NEW)
    ========================= */
    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:blur(12px);
      background:rgba(255,255,255,.85);
      border-bottom:1px solid var(--border);
    }

    .topbar-inner{
      width:min(var(--max), calc(100% - 28px));
      margin:0 auto;
      min-height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand-badge{
      width:36px;
      height:36px;
      border-radius:10px;
      background:linear-gradient(135deg,var(--blue),var(--teal));
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:700;
    }

    .brand-kicker{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
    }

    .brand-title{
      font-size:1rem;
      font-weight:700;
      color:var(--navy);
    }

    .nav{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .nav a{
      padding:8px 12px;
      border-radius:999px;
      font-size:.95rem;
      text-decoration:none;
      color:var(--navy);
      transition:.2s;
    }

    .nav a:hover{
      background:rgba(44,123,229,.08);
    }

    .nav a.active{
      background:linear-gradient(135deg,var(--blue),var(--teal));
      color:#fff;
    }

    /* ========================= */

    .wrap{
      width:min(var(--max), calc(100% - 28px));
      margin:0 auto;
      padding:18px 0 32px;
    }

    .hero{
      background:linear-gradient(135deg, rgba(44,123,229,.95), rgba(74,108,247,.90) 45%, rgba(31,182,170,.88));
      color:#fff;
      border-radius:32px;
      padding:30px 24px;
      box-shadow:var(--shadow);
      margin:18px 0 18px; /* slight spacing below nav */
      position:relative;
      overflow:hidden;
    }

    /* ---- EVERYTHING BELOW IS YOUR ORIGINAL DESIGN ---- */
    /* (unchanged for brevity, but you keep your full CSS exactly as-is) */

  </style>
</head>

<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-badge">V</div>
        <div>
          <div class="brand-kicker">VUMC Kiosk</div>
          <div class="brand-title">Check-In</div>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="check-in.html" class="active">Check In</a>
        <a href="event-signups.html">Event Signups</a>
      </nav>
    </div>
  </header>

  <!-- YOUR ORIGINAL CONTENT -->
  <div class="wrap">

    <section class="hero">
      <h1>VUMC Check-In</h1>
      <p>Search by last name or scroll the people list, select one or more people, and submit.</p>
    </section>

    <!-- KEEP EVERYTHING ELSE EXACTLY THE SAME -->
    <!-- (No changes to your panels, JS, or logic) -->

  </div>

  <!-- KEEP YOUR ORIGINAL SCRIPT BLOCK EXACTLY AS-IS -->

</body>
</html>
